<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav{
            background-color: bisque;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
        }
        h2{
            color: rgb(238, 4, 4);

        }
        .menu{
            display: flex;
            text-decoration: none;
            font-size: 18px;
            gap: 30px;
        }
        a{
            color: black;
            text-decoration: none;
            font-size: 18px;

        }
        a:hover{
            color: rgb(228, 26, 76);
            transition: 0.4s;
        }
    </style>
</head>
<body>
    <nav>
        <h2>Code academy</h2>
        <div class="menu">
            <a href="">HOME</a>
            <a href="">COURSES</a>
            <a href="">PROJECT</a>
            <a href="">LOGIN</a>
        </div>
    </nav>
</body>
</html>
