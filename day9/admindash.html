<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 80px auto 80px;
            gap: 10px;
            border: 1px solid;
        }
        header{
            grid-column: 1/3;
            /* start with colum 1 end before the colum no. three*/
            background-color: blue;
            padding: 20px;
        }
        aside{
            
            background-color: chartreuse;
            padding: 20px;
        }
        main{
            background-color: crimson;
            padding: 20px;
        }
        footer{
            grid-column: 1/3;
            background-color: darksalmon;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        <aside>Side bar</aside>
        <!-- used to create a side bar -->
        <main>Main</main>
        <footer>Footer</footer>
    </div>
</body>
</html>
